# =============================================================================
# Banking Ledger — Full Stack Docker Compose
# =============================================================================
services:

  # ─────────────────────────────────────────────────────────────────────────
  # Frontend — React / Vite served by Nginx
  # ─────────────────────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: banking_ledger_frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend

  # ─────────────────────────────────────────────────────────────────────────
  # Backend — Spring Boot API
  # ─────────────────────────────────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: banking_ledger_backend
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=production
      - SPRING_JPA_HIBERNATE_DDL_AUTO=update
      - MYSQL_HOST=db
      - MYSQL_HOST_PORT=3306
      - MYSQL_DATABASE=${MYSQL_DATABASE:-banking_ledger}
      - MYSQL_USER=${MYSQL_USER:-ledger_app}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD:-Dev@1234}
      - REDIS_HOST=redis
      - REDIS_HOST_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:-RedisProdPass@99}
      - JWT_SECRET=${JWT_SECRET:-production-secret-must-be-long-and-secure-base64}
      - APP_BASE_URL=${APP_BASE_URL:-http://localhost:3000}
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS:-http://localhost:3000}
      - ERROR_BASE_URI=${ERROR_BASE_URI:-http://localhost:8080/errors/}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ─────────────────────────────────────────────────────────────────────────
  # Database — MySQL 8.4
  # ─────────────────────────────────────────────────────────────────────────
  db:
    image: mysql:8.4
    container_name: banking_ledger_db
    restart: unless-stopped
    ports:
      - "3306:3306"
    environment:
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD:-RootPass@1234}
      - MYSQL_DATABASE=${MYSQL_DATABASE:-banking_ledger}
      - MYSQL_USER=${MYSQL_USER:-ledger_app}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD:-Dev@1234}
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-RootPass@1234}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────────────────────────────────────
  # Redis 7.2  (distributed locking, token blacklist, exchange rate cache)
  # ─────────────────────────────────────────────────────────────────────────
  redis:
    image: redis:7.2-alpine
    container_name: banking_ledger_redis
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:-RedisProdPass@99}
      --appendonly yes
      --appendfsync everysec
    ports:
      - "16379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-RedisProdPass@99}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  mysql_data:
  redis_data: