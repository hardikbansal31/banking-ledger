# =============================================================================
# application-development.yml — local dev overrides
# Active when: spring.profiles.active=development
# =============================================================================

spring:

  # ── MySQL ───────────────────────────────────────────────────────────────────
  datasource:
    url: jdbc:mysql://localhost:3306/banking_ledger?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&characterEncoding=UTF-8
    username: dashuser
    password: mypassword
    driver-class-name: com.mysql.cj.jdbc.Driver

  # ── Redis (Spring Data — used by StringRedisTemplate) ───────────────────────
  data:
    redis:
      host: localhost
      port: 6380
      password: RedisDevPass@99

  # ── Redisson (redisson-spring-boot-starter reads spring.redis.redisson) ─────
  # Must be inside the same 'spring:' block — not a separate top-level key.
  redis:
    redisson:
      config: |
        singleServerConfig:
          address: "redis://localhost:6380"
          password: "RedisDevPass@99"
          connectionMinimumIdleSize: 2
          connectionPoolSize: 10
          connectTimeout: 3000
          timeout: 3000
          retryAttempts: 3
          retryInterval: 1000

  # ── Quartz ───────────────────────────────────────────────────────────────────
  quartz:
    job-store-type: memory
    jdbc:
      initialize-schema: never

  # ── JPA ─────────────────────────────────────────────────────────────────────
  jpa:
    show-sql: true
    hibernate:
      ddl-auto: update

# ── App config ─────────────────────────────────────────────────────────────
app:
  security:
    jwt:
      secret: bW9ja0RldlNlY3JldEtleUZvckxvY2FsRGV2ZWxvcG1lbnRPbmx5MjAyNUJhbmtpbmdMZWRnZXI=
      expiration-ms: 3600000
      refresh-expiration-ms: 86400000
    cors:
      allowed-origins: http://localhost:3000,http://localhost:5173

  exchange-rate:
    api-key: mock-key-not-needed-until-phase-5
    base-url: https://v6.exchangerate-api.com/v6
    cache-ttl-minutes: 60

# ── Logging ─────────────────────────────────────────────────────────────────
logging:
  level:
    root: INFO
    com.bankingcore.bankingledger: DEBUG
    org.hibernate.SQL: DEBUG
    org.springframework.security: DEBUG
    org.redisson: DEBUG